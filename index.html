<!doctype html>
<html lang="en-GB">
    <head>
        <meta charset="utf-8" />
        <title>Ebi online</title>
        <style>
            body {
                background-color: #001E1E;
                color: #019a94;
                padding: 0px;
                margin: 0px;
            }
            .error {
                background-color: rgb(121, 38, 38);
                color: black;
                display: none;
            }
            .output {
                background-color: #00312F;
                color: #019a94;
                display: none;
            }
        </style>
        <script type="text/javascript">
            function analyse_completeness_changed(event) {
                document.getElementById("analyse_completeness_output").parentElement.style.display = "none";
                document.getElementById("analyse_completeness_error").parentElement.style.display = "none";

                file = document.getElementById("analyse_completeness_input_0").files[0];
                var fr = new FileReader();
                fr.onload = function(e) {
                    console.log("file loaded");
                    window.analyse_completeness_input_0 = e.target.result;
                    document.getElementById("analyse_completeness_button_run").disabled = false;
                };
                fr.readAsText(file);
            }

            function analyse_completeness_run() {
                console.log("run");
                window.analyse_completeness([window.analyse_completeness_input_0])
            }
        </script>
    </head>
    <body>
        <script type="module">
            function ebi_error(error, command_name) {
                console.log("Error: " + error);
                document.getElementById(command_name + "_error").innerHTML = error;
                document.getElementById(command_name + "_error").parentElement.style.display = "block";
            }

            function ebi_output(output, command_name) {
                document.getElementById(command_name + "_output").innerHTML = output;
                document.getElementById(command_name + "_output").parentElement.style.display = "block";
            }

            function ebi_log(message, command_name) {
                console.log(message);
            }

            import init, { analyse_completeness } from "./pkg/ebi.js";
            window.analyse_completeness = analyse_completeness;
            window.ebi_output = ebi_output;
            window.ebi_error = ebi_error;
            window.ebi_log = ebi_log;

            init();
        </script>

        <table class="online-command">
            <tr>
                <td>FILE</td>
                <td>
                    <input 
                        type="file" 
                        id="analyse_completeness_input_0" 
                        onchange="analyse_completeness_changed(event);"
                        autocomplete="off"/>
                </td>
            </tr>
            <tr><td></td><td>
                <button id="analyse_completeness_button_run" onclick="analyse_completeness_run(event);" 
                    disabled
                    autocomplete = "off">
                    Run command
                </button>
            </td></tr>
        </table>
        <div class="error">Error:<br><pre id="analyse_completeness_error"></pre></div>
        <div class="output">Result:<br><pre id="analyse_completeness_output"></pre></div>
    </body>
</html>
